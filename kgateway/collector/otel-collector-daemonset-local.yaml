mode: daemonset
image:
  repository: otel/opentelemetry-collector-k8s

resources:
  limits:
    memory: 512Mi
  requests:
    memory: 256Mi

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["nodes/proxy"]
      verbs: ["get"]

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

presets:
  logsCollection:
    enabled: true
  kubeletMetrics:
    enabled: true
  hostMetrics:
    enabled: true

config:
  processors:
    # Memory limiter to prevent OOM
    memory_limiter:
      check_interval: 2s
      limit_percentage: 75
      spike_limit_percentage: 15

    # Batch processor for efficient export
    batch:
      timeout: 5s
      send_batch_size: 512

    k8sattributes:
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.deployment.name
          - k8s.replicaset.name
          - k8s.statefulset.name
          - k8s.daemonset.name
          - k8s.cronjob.name
          - k8s.job.name
          - k8s.node.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.pod.start_time
          - k8s.container.name
        labels:
          - from: pod
            key_regex: (.*)
            tag_name: k8s.pod.label.$${1}
        annotations:
          - from: pod
            key_regex: (.*)
            tag_name: k8s.pod.annotation.$${1}
      filter:
        node_from_env_var: K8S_NODE_NAME
      passthrough: false
      pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: connection

  receivers:
    kubeletstats:
      insecure_skip_verify: true # For testing purposes. Remove for production.
      metrics:
        container.cpu.usage:
          enabled: true
        k8s.node.cpu.usage:
          enabled: true
        k8s.pod.cpu.usage:
          enabled: true
        k8s.pod.cpu_limit_utilization:
          enabled: true
        k8s.pod.cpu_request_utilization:
          enabled: true
        k8s.pod.memory_limit_utilization:
          enabled: true
        k8s.pod.memory_request_utilization:
          enabled: true

  exporters:
    # Forward to deployment collector for local stack export
    otlp:
      endpoint: otel-collector-opentelemetry-collector.opentelemetry.svc.cluster.local:4317
      tls:
        insecure: true

  service:
    extensions:
      - health_check
    pipelines:
      logs:
        processors:
          - memory_limiter
          - k8sattributes
          - batch
        exporters:
          - otlp
      metrics:
        processors:
          - memory_limiter
          - batch
        exporters:
          - otlp
      traces:
        processors:
          - memory_limiter
          - batch
        exporters:
          - otlp
