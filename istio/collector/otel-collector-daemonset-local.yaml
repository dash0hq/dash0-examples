mode: daemonset
image:
  repository: otel/opentelemetry-collector-contrib

resources:
  limits:
    memory: 256Mi
  requests:
    memory: 128Mi

extraEnvs:
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName

presets:
  kubernetesAttributes:
    enabled: true
  kubeletMetrics:
    enabled: true
  hostMetrics:
    enabled: true

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "nodes", "nodes/stats"]
      verbs: ["get", "list", "watch"]

config:
  processors:
    memory_limiter:
      check_interval: 2s
      limit_percentage: 75
      spike_limit_percentage: 15

    batch:
      timeout: 5s
      send_batch_size: 512

    # Add K8s attributes to all telemetry
    k8sattributes:
      auth_type: "serviceAccount"
      passthrough: false
      extract:
        metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
          - k8s.namespace.name
          - k8s.node.name
          - k8s.pod.start_time
        labels:
          - tag_name: app
            key: app
            from: pod
          - tag_name: version
            key: version
            from: pod
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid
        - sources:
            - from: connection

  receivers:
    otlp:
      protocols:
        grpc: {}
        http: {}

  exporters:
    # Forward to deployment collector for local stack export
    otlp/collector:
      endpoint: otel-collector-opentelemetry-collector.opentelemetry.svc.cluster.local:4317
      tls:
        insecure: true

  service:
    extensions:
      - health_check
    pipelines:
      logs:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - k8sattributes
          - batch
        exporters:
          - otlp/collector
      metrics:
        receivers:
          - otlp
          - kubeletstats
          - hostmetrics
        processors:
          - memory_limiter
          - k8sattributes
          - batch
        exporters:
          - otlp/collector
      traces:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - k8sattributes
          - batch
        exporters:
          - otlp/collector
